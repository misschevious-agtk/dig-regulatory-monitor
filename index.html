<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIG Regulatory Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Syne:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy:        #0B1724;
  --navy-2:      #152234;
  --navy-3:      #1E3148;
  --gold:        #B8872A;
  --gold-light:  #D4A84B;
  --gold-pale:   #F5EDD8;
  --cream:       #F4F1EC;
  --white:       #FFFFFF;
  --ink:         #0B1724;
  --ink-2:       #3D4F62;
  --ink-3:       #7A8FA3;
  --rule:        #E3DDD4;
  --rule-light:  #EDE9E3;
  --ai-accent:   #1A6B5A;
  --ai-bg:       #E0F2EC;
  --past-accent: #6B5A1A;
  --past-bg:     #F2EFE0;
  --ease: cubic-bezier(0.22, 1, 0.36, 1);
}

html { scroll-behavior: smooth; }
body {
  font-family: 'Syne', sans-serif;
  background: var(--cream);
  color: var(--ink);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; } to { opacity: 1; }
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: 0.5; transform: scale(0.7); }
}

/* Header */
header {
  background: var(--navy);
  height: 58px;
  padding: 0 2.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 200;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  animation: fadeIn 0.4s both;
}

.header-left { display: flex; align-items: center; gap: 14px; }
.brand { display: flex; align-items: center; }
.brand-name { font-size: 13px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #fff; }
.brand-sep { width: 1px; height: 14px; background: rgba(255,255,255,0.2); margin: 0 13px; }
.brand-sub { font-size: 12px; font-weight: 400; letter-spacing: 0.05em; color: rgba(255,255,255,0.5); }
.header-right { display: flex; align-items: center; gap: 18px; }
.hdr-status { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; letter-spacing: 0.06em; color: var(--gold-light); }

/* Navigation */
nav {
  background: var(--white);
  border-bottom: 1px solid var(--rule);
  padding: 0 2.5rem;
  display: flex;
  gap: 0;
  position: sticky;
  top: 58px;
  z-index: 100;
  animation: fadeIn 0.5s 0.1s both;
  overflow-x: auto;
  scrollbar-width: none;
}
nav::-webkit-scrollbar { display: none; }

.nav-tab {
  padding: 15px 18px;
  font-size: 12px;
  font-weight: 500;
  font-family: 'Syne', sans-serif;
  letter-spacing: 0.04em;
  color: var(--ink-3);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color 0.2s, border-color 0.2s;
  white-space: nowrap;
  user-select: none;
  display: flex;
  align-items: center;
  gap: 7px;
  flex-shrink: 0;
}
.nav-tab:hover { color: var(--ink); }
.nav-tab.active { color: var(--navy); border-bottom-color: var(--gold); }

.nav-count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  padding: 2px 6px;
  border-radius: 2px;
  background: var(--rule-light);
  color: var(--ink-3);
  min-width: 20px;
  text-align: center;
}
.nav-tab.active .nav-count { background: var(--gold-pale); color: var(--gold); }

.nav-tab.ai-tab { color: var(--ai-accent); }
.nav-tab.ai-tab.active { border-bottom-color: var(--ai-accent); color: var(--ai-accent); }
.nav-tab.ai-tab.active .nav-count { background: var(--ai-bg); color: var(--ai-accent); }
.ai-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ai-accent); animation: pulse 2s ease-in-out infinite; }

.nav-tab.past-tab { color: var(--past-accent); }
.nav-tab.past-tab.active { border-bottom-color: var(--past-accent); color: var(--past-accent); }
.nav-tab.past-tab.active .nav-count { background: var(--past-bg); color: var(--past-accent); }

/* Main */
main { max-width: 1180px; margin: 0 auto; padding: 2.75rem 2rem 5rem; }

.section-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 2rem;
  animation: fadeUp 0.5s 0.15s both;
  flex-wrap: wrap;
  gap: 12px;
}

.section-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px;
  font-weight: 600;
  color: var(--navy);
  letter-spacing: -0.02em;
}
.section-title.ai-title { color: var(--ai-accent); }
.section-title.past-title { color: var(--past-accent); }

.section-meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--ink-3);
  letter-spacing: 0.05em;
}

/* Day group */
.day-group-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-3);
  padding: 0.5rem 0 0.75rem;
  border-bottom: 1px solid var(--rule);
  margin: 0 0 1.25rem;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 12px;
  animation: fadeUp 0.4s var(--ease) both;
}
.day-group-label.today {
  color: var(--gold);
  border-bottom-color: var(--gold-pale);
}
.day-group { margin-bottom: 2.5rem; }
.day-group:last-child { margin-bottom: 0; }

/* Cards */
.cards-wrap { display: flex; flex-direction: column; gap: 1.125rem; }
.cards-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.125rem; }

.card {
  background: var(--white);
  border: 1px solid var(--rule);
  border-radius: 4px;
  padding: 1.625rem 1.875rem 1.375rem;
  display: flex;
  flex-direction: column;
  gap: 0.875rem;
  transition: border-color 0.25s var(--ease), transform 0.25s var(--ease), box-shadow 0.25s var(--ease);
  animation: fadeUp 0.5s var(--ease) both;
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 3px;
  background: var(--gold);
  transform: scaleY(0);
  transform-origin: bottom;
  transition: transform 0.3s var(--ease);
}
.card:hover::before { transform: scaleY(1); }
.card:hover { border-color: var(--gold-light); }

.card-featured { width: 100%; }

.card-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px;
  font-weight: 600;
  color: var(--navy);
  line-height: 1.4;
  letter-spacing: -0.01em;
}

.card-featured .card-title {
  font-size: 19px;
  line-height: 1.45;
}

.card-body {
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  line-height: 1.65;
  color: var(--ink-2);
  letter-spacing: 0.3px;
}

.card-footer {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: 12px;
  font-size: 11px;
  margin-top: 0.5rem;
}

.card-date {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--ink-3);
  letter-spacing: 0.03em;
}

.card-source {
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  color: var(--ink-3);
  text-decoration: none;
  border-bottom: 1px solid transparent;
  transition: color 0.2s, border-color 0.2s;
}
.card-source:hover {
  color: var(--gold);
  border-bottom-color: var(--gold-light);
}

.tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 0.5rem;
}

.tag {
  display: inline-block;
  font-family: 'Syne', sans-serif;
  font-size: 10px;
  font-weight: 500;
  padding: 4px 9px;
  border-radius: 3px;
  background: rgba(184, 135, 42, 0.1);
  color: var(--gold);
  letter-spacing: 0.02em;
}
.tag.ai-tag { background: var(--ai-bg); color: var(--ai-accent); }

.empty-section {
  padding: 3rem 2rem;
  text-align: center;
  background: var(--white);
  border: 1px solid var(--rule);
  border-radius: 4px;
  color: var(--ink-3);
  font-size: 13px;
  line-height: 1.6;
}

.empty-section strong {
  display: block;
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  color: var(--navy);
  margin-bottom: 0.5rem;
  font-weight: 600;
}

.loading {
  text-align: center;
  padding: 4rem 2rem;
  font-size: 14px;
  color: var(--ink-3);
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.05em;
}

/* Footer */
footer {
  border-top: 1px solid var(--rule);
  background: var(--white);
  padding: 1.5rem 2.5rem;
  text-align: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  color: var(--ink-3);
  letter-spacing: 0.05em;
}

@media (max-width: 768px) {
  header { padding: 0 1.5rem; }
  nav { padding: 0 1.5rem; }
  main { padding: 1.75rem 1rem 3rem; }
  .section-title { font-size: 22px; }
  .cards-row { grid-template-columns: 1fr; }
  footer { padding: 1.25rem 1.5rem; }
}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="brand">
      <div class="brand-name">DIG</div>
      <div class="brand-sep"></div>
      <div class="brand-sub">Regulatory Monitor</div>
    </div>
  </div>
  <div class="header-right">
    <div class="hdr-status" id="status-sync">Loading…</div>
  </div>
</header>

<nav>
  <div class="nav-tab active" data-section="trending">
    <span>Trending Today</span>
    <span class="nav-count" id="nc-trending"></span>
  </div>
  <div class="nav-tab" data-section="competition">
    <span>Competition Law</span>
    <span class="nav-count" id="nc-competition"></span>
  </div>
  <div class="nav-tab" data-section="privacy">
    <span>Data & Privacy</span>
    <span class="nav-count" id="nc-privacy"></span>
  </div>
  <div class="nav-tab" data-section="ip">
    <span>IP Law</span>
    <span class="nav-count" id="nc-ip"></span>
  </div>
  <div class="nav-tab ai-tab" data-section="ai_landscape">
    <div class="ai-dot"></div>
    <span>AI Regulatory Changes</span>
    <span class="nav-count" id="nc-ai_landscape"></span>
  </div>
  <div class="nav-tab past-tab" data-section="past">
    <span>Old News</span>
    <span class="nav-count" id="nc-past"></span>
  </div>
</nav>

<main>
  <div id="main-content" class="loading">Loading regulatory briefing…</div>
</main>

<footer>
  DIG Digital Regulatory Team · Internal Use Only · Updated daily
</footer>

<script>
// ──────────────────────────────────────────────────────────
// Constants
// ──────────────────────────────────────────────────────────
const WINDOW_DAYS = 7;
const PILLAR_KEYS = ['trending', 'competition', 'privacy', 'ip', 'ai_landscape'];
const PAST_KEY = 'dig_past_news';
const PREV_KEY = 'dig_prev_index';

// ──────────────────────────────────────────────────────────
// Date utilities
// ──────────────────────────────────────────────────────────
function parseDate(article) {
  if (!article.date) return null;
  const d = new Date(article.date);
  return isNaN(d.getTime()) ? null : d;
}

function isThisWeek(date) {
  const now = new Date();
  const diff = now.getTime() - date.getTime();
  const days = diff / (1000 * 60 * 60 * 24);
  return days >= 0 && days < WINDOW_DAYS;
}

function isOlderThanWeek(date) {
  const now = new Date();
  const diff = now.getTime() - date.getTime();
  const days = diff / (1000 * 60 * 60 * 24);
  return days >= WINDOW_DAYS;
}

function isToday(date) {
  const now = new Date();
  return date.toDateString() === now.toDateString();
}

function dayLabel(date) {
  if (isToday(date)) return 'Today';
  const yesterday = new Date();
  yesterday.setDate(yesterday.getDate() - 1);
  if (date.toDateString() === yesterday.toDateString()) return 'Yesterday';
  return date.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
}

function formatDateShort(date) {
  return date.toLocaleDateString('en-GB', { day: '2-digit', month: '2-digit', year: 'numeric' });
}

function formatDateLong(date) {
  return date.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
}

function sortDesc(items) {
  return [...items].sort((a, b) => {
    const da = parseDate(a);
    const db = parseDate(b);
    if (!da || !db) return 0;
    return db.getTime() - da.getTime();
  });
}

function groupByDay(items) {
  const groups = {};
  items.forEach(a => {
    const d = parseDate(a);
    if (!d) return;
    const key = d.toDateString();
    if (!groups[key]) groups[key] = { date: d, items: [] };
    groups[key].items.push(a);
  });
  return Object.values(groups).sort((a, b) => b.date.getTime() - a.date.getTime());
}

// ──────────────────────────────────────────────────────────
// Card rendering
// ──────────────────────────────────────────────────────────
function renderCard(article, featured = false, delay = 0, isAi = false) {
  const src = (article.source || 'Source').replace(/\//g, ' / ');
  const d = parseDate(article) || new Date();
  const date = formatDateShort(d);
  const tags = (article.tags || []).slice(0, 3);
  
  const cardClass = featured ? 'card card-featured' : 'card';
  const tagClass = isAi ? 'tag ai-tag' : 'tag';
  
  const tagsHtml = tags.length 
    ? `<div class="tags">${tags.map(t => `<span class="${tagClass}">${t}</span>`).join('')}</div>`
    : '';
  
  return `
    <div class="${cardClass}" style="animation-delay:${delay}s">
      <div class="card-title">${article.title || 'Untitled'}</div>
      <div class="card-body">${article.body || ''}</div>
      ${tagsHtml}
      <div class="card-footer">
        <div>
          <div class="card-date">${date}</div>
          <a href="${article.url || '#'}" target="_blank" rel="noopener" class="card-source">${src}</a>
        </div>
      </div>
    </div>
  `;
}

// ──────────────────────────────────────────────────────────
// Section rendering
// ──────────────────────────────────────────────────────────
const SECTION_META = {
  trending: { label: 'Trending Today', titleClass: '' },
  competition: { label: 'Competition Law', titleClass: '' },
  privacy: { label: 'Data & Privacy', titleClass: '' },
  ip: { label: 'IP Law', titleClass: '' },
  ai_landscape: { label: 'AI Regulatory Changes', titleClass: 'ai-title' }
};

function renderSection(items, sectionKey) {
  const meta = SECTION_META[sectionKey];
  if (!meta) return '<p>Unknown section</p>';
  
  const isAi = sectionKey === 'ai_landscape';
  
  // Filter to 7-day window
  const filtered = items.filter(a => {
    const d = parseDate(a);
    return d && isThisWeek(d);
  });

  if (!filtered.length) {
    return `
      <div class="section-head">
        <h2 class="section-title ${meta.titleClass}">${meta.label}</h2>
        <span class="section-meta">${WINDOW_DAYS}-day window</span>
      </div>
      <div class="empty-section">
        <strong>No new articles in the last ${WINDOW_DAYS} days</strong>
        Check back tomorrow — the briefing updates daily.
      </div>
    `;
  }

  const sorted = sortDesc(filtered);
  const groups = groupByDay(sorted);

  let html = `
    <div class="section-head">
      <h2 class="section-title ${meta.titleClass}">${meta.label}</h2>
      <span class="section-meta">${filtered.length} article${filtered.length !== 1 ? 's' : ''} · last ${WINDOW_DAYS} days</span>
    </div>
  `;

  let baseDelay = 0.05;
  groups.forEach(g => {
    const today = isToday(g.date);
    html += `
      <div class="day-group">
        <div class="day-group-label${today ? ' today' : ''}">
          <span style="font-weight:600;letter-spacing:0.14em">${dayLabel(g.date)}</span>
          <span style="opacity:0.75;font-weight:400">${g.items.length} item${g.items.length !== 1 ? 's' : ''} · ${formatDateShort(g.date)}</span>
        </div>
        <div class="cards-wrap">
    `;
    const [first, ...rest] = g.items;
    html += renderCard(first, true, baseDelay, isAi);
    if (rest.length) {
      html += `<div class="cards-row">` +
        rest.map((a, i) => renderCard(a, false, baseDelay + 0.04 + i * 0.03, isAi)).join('') +
        `</div>`;
    }
    html += `</div></div>`;
    baseDelay += 0.1;
  });

  return html;
}

// ──────────────────────────────────────────────────────────
// Past News (Old News) — articles older than 7 days
// ──────────────────────────────────────────────────────────
function getPastFromCurrent() {
  // Pull articles from current data that are OLDER than 7 days
  const past = [];
  PILLAR_KEYS.forEach(k => {
    (allData[k] || []).forEach(a => {
      const d = parseDate(a);
      if (d && isOlderThanWeek(d)) {
        past.push({ ...a, _pillar: k });
      }
    });
  });
  
  // Also include archived items from localStorage
  let stored = [];
  try { stored = JSON.parse(localStorage.getItem(PAST_KEY) || '[]'); }
  catch {}
  
  // Combine and dedupe by URL
  const seen = new Set();
  const combined = [];
  [...past, ...stored].forEach(a => {
    if (!seen.has(a.url)) {
      seen.add(a.url);
      combined.push(a);
    }
  });
  
  return sortDesc(combined);
}

function archiveOld(freshIndex) {
  // Save current articles as "previous" for next-time comparison
  const allCurrent = [];
  PILLAR_KEYS.forEach(k => {
    (freshIndex[k] || []).forEach(a => allCurrent.push({ ...a, _pillar: k }));
  });
  
  // Get previously seen articles
  let prev = [];
  try { prev = JSON.parse(localStorage.getItem(PREV_KEY) || '[]'); }
  catch {}
  
  // Articles in prev that are no longer in current AND are older than 7 days → archive
  let past = [];
  try { past = JSON.parse(localStorage.getItem(PAST_KEY) || '[]'); }
  catch {}
  
  const currentUrls = new Set(allCurrent.map(a => a.url));
  const pastUrls = new Set(past.map(a => a.url));
  
  prev.forEach(a => {
    if (!currentUrls.has(a.url) && !pastUrls.has(a.url)) {
      const d = parseDate(a);
      if (d && isOlderThanWeek(d)) {
        past.unshift({ ...a, archived_at: new Date().toISOString() });
      }
    }
  });
  
  // Cap to 500 items
  past = past.slice(0, 500);
  
  try {
    localStorage.setItem(PAST_KEY, JSON.stringify(past));
    localStorage.setItem(PREV_KEY, JSON.stringify(allCurrent));
  } catch {}
}

function renderPastNews() {
  const past = getPastFromCurrent();
  const main = document.getElementById('main-content');
  
  if (!past.length) {
    main.innerHTML = `
      <div class="section-head">
        <h2 class="section-title past-title">Old News</h2>
        <span class="section-meta">Archive</span>
      </div>
      <div class="empty-section">
        <strong>No archived articles yet</strong>
        Articles older than ${WINDOW_DAYS} days will automatically appear here.
      </div>
    `;
    return;
  }
  
  // Group by month
  const groups = {};
  past.forEach(a => {
    const d = parseDate(a) || new Date();
    const key = d.toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
    if (!groups[key]) groups[key] = { date: d, items: [] };
    groups[key].items.push(a);
  });
  
  const sortedGroups = Object.entries(groups).sort((a, b) => b[1].date.getTime() - a[1].date.getTime());
  
  let html = `
    <div class="section-head">
      <h2 class="section-title past-title">Old News</h2>
      <span class="section-meta">${past.length} archived article${past.length !== 1 ? 's' : ''}</span>
    </div>
  `;
  
  let baseDelay = 0.05;
  sortedGroups.forEach(([monthLabel, group]) => {
    html += `
      <div class="day-group">
        <div class="day-group-label">
          <span style="font-weight:600;letter-spacing:0.14em">${monthLabel}</span>
          <span style="opacity:0.75;font-weight:400">${group.items.length} item${group.items.length !== 1 ? 's' : ''}</span>
        </div>
        <div class="cards-wrap">
    `;
    const [first, ...rest] = group.items;
    html += renderCard(first, true, baseDelay);
    if (rest.length) {
      html += `<div class="cards-row">` +
        rest.map((a, i) => renderCard(a, false, baseDelay + 0.04 + i * 0.03)).join('') +
        `</div>`;
    }
    html += `</div></div>`;
    baseDelay += 0.1;
  });
  
  main.innerHTML = html;
}

// ──────────────────────────────────────────────────────────
// Navigation
// ──────────────────────────────────────────────────────────
let allData = {}, activeSection = 'trending';

document.querySelectorAll('.nav-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    activeSection = tab.dataset.section;
    renderActive();
  });
});

function renderActive() {
  const main = document.getElementById('main-content');
  if (activeSection === 'past') {
    renderPastNews();
    return;
  }
  main.innerHTML = renderSection(allData[activeSection] || [], activeSection);
}

function updateCounts() {
  PILLAR_KEYS.forEach(k => {
    const items = (allData[k] || []).filter(a => {
      const d = parseDate(a);
      return d && isThisWeek(d);
    });
    const el = document.getElementById('nc-' + k);
    if (el) el.textContent = items.length || '';
  });
  const pastCount = getPastFromCurrent().length;
  const el = document.getElementById('nc-past');
  if (el) el.textContent = pastCount || '';
}

// ──────────────────────────────────────────────────────────
// Load content
// ──────────────────────────────────────────────────────────
async function loadContent() {
  try {
    const res = await fetch('content/index.json?t=' + Date.now());
    if (!res.ok) throw new Error('Failed to load content');
    allData = await res.json();
    archiveOld(allData);

    if (allData.generated_at) {
      const d = new Date(allData.generated_at);
      document.getElementById('status-sync').textContent = 'Updated: ' +
        d.toLocaleDateString('en-GB', { day: '2-digit', month: '2-digit', year: 'numeric' }) + ' ' +
        d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }) + ' UTC';
    }
  } catch (err) {
    console.error('Error loading content:', err);
    document.getElementById('status-sync').textContent = 'Failed to load';
    document.getElementById('main-content').innerHTML = `
      <div class="empty-section">
        <strong>Could not load briefing</strong>
        Please check that <code>content/index.json</code> exists in the repository.
      </div>
    `;
    return;
  }
  
  updateCounts();
  renderActive();
}

window.addEventListener('load', loadContent);
</script>
