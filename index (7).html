<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIG Regulatory Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Syne:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy:        #0B1724;
  --navy-2:      #152234;
  --navy-3:      #1E3148;
  --gold:        #B8872A;
  --gold-light:  #D4A84B;
  --gold-pale:   #F5EDD8;
  --cream:       #F4F1EC;
  --white:       #FFFFFF;
  --ink:         #0B1724;
  --ink-2:       #3D4F62;
  --ink-3:       #7A8FA3;
  --rule:        #E3DDD4;
  --rule-light:  #EDE9E3;
  --ease: cubic-bezier(0.22, 1, 0.36, 1);
}

html { scroll-behavior: smooth; }
body {
  font-family: 'Syne', sans-serif;
  background: var(--cream);
  color: var(--ink);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; } to { opacity: 1; }
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: 0.5; transform: scale(0.7); }
}

/* Header */
header {
  background: var(--navy);
  height: 58px;
  padding: 0 2.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 200;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  animation: fadeIn 0.4s both;
}

.header-left { display: flex; align-items: center; gap: 14px; }
.brand { display: flex; align-items: center; }
.brand-name { font-size: 13px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #fff; }
.brand-sep { width: 1px; height: 14px; background: rgba(255,255,255,0.2); margin: 0 13px; }
.brand-sub { font-size: 12px; font-weight: 400; letter-spacing: 0.05em; color: rgba(255,255,255,0.5); }
.header-right { display: flex; align-items: center; gap: 18px; }
.hdr-status { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; letter-spacing: 0.06em; color: var(--gold-light); }

/* Navigation */
nav {
  background: var(--white);
  border-bottom: 1px solid var(--rule);
  padding: 0 2.5rem;
  display: flex;
  gap: 0;
  position: sticky;
  top: 58px;
  z-index: 100;
  animation: fadeIn 0.5s 0.1s both;
  overflow-x: auto;
  scrollbar-width: none;
}
nav::-webkit-scrollbar { display: none; }

.nav-tab {
  padding: 15px 18px;
  font-size: 12px;
  font-weight: 500;
  font-family: 'Syne', sans-serif;
  letter-spacing: 0.04em;
  color: var(--ink-3);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color 0.2s, border-color 0.2s;
  white-space: nowrap;
  user-select: none;
  display: flex;
  align-items: center;
  gap: 7px;
  flex-shrink: 0;
}
.nav-tab:hover { color: var(--ink); }
.nav-tab.active { color: var(--navy); border-bottom-color: var(--gold); }

.nav-count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  padding: 2px 6px;
  border-radius: 2px;
  background: var(--rule-light);
  color: var(--ink-3);
  min-width: 20px;
  text-align: center;
}
.nav-tab.active .nav-count { background: var(--gold-pale); color: var(--gold); }

.ai-dot { width: 6px; height: 6px; border-radius: 50%; background: #1A6B5A; animation: pulse 2s ease-in-out infinite; }

/* Main */
main { max-width: 1180px; margin: 0 auto; padding: 2.75rem 2rem 5rem; }

.section-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 2rem;
  animation: fadeUp 0.5s 0.15s both;
}

.section-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px;
  font-weight: 600;
  color: var(--navy);
  letter-spacing: -0.02em;
}

.section-meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--ink-3);
  letter-spacing: 0.05em;
}

/* Day group */
.day-group-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-3);
  padding: 0.5rem 0 0.75rem;
  border-bottom: 1px solid var(--rule);
  margin: 0 0 1.25rem;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 12px;
  animation: fadeUp 0.4s var(--ease) both;
}
.day-group-label.today {
  color: var(--gold);
  border-bottom-color: var(--gold-pale);
}
.day-group { margin-bottom: 2.5rem; }
.day-group:last-child { margin-bottom: 0; }

/* Cards */
.cards-wrap { display: flex; flex-direction: column; gap: 1.125rem; }
.cards-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.125rem; }

.card {
  background: var(--white);
  border: 1px solid var(--rule);
  border-radius: 4px;
  padding: 1.625rem 1.875rem 1.375rem;
  display: flex;
  flex-direction: column;
  gap: 0.875rem;
  transition: border-color 0.25s var(--ease), transform 0.25s var(--ease), box-shadow 0.25s var(--ease);
  animation: fadeUp 0.5s var(--ease) both;
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 3px;
  background: var(--gold);
  transform: scaleY(0);
  transform-origin: bottom;
  transition: transform 0.3s var(--ease);
}
.card:hover::before { transform: scaleY(1); }
.card:hover { border-color: var(--gold-light); }

.card-featured { width: 100%; }

.card-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px;
  font-weight: 600;
  color: var(--navy);
  line-height: 1.4;
  letter-spacing: -0.01em;
}

.card-featured .card-title {
  font-size: 19px;
  line-height: 1.45;
}

.card-body {
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  line-height: 1.65;
  color: var(--ink-2);
  letter-spacing: 0.3px;
}

.card-footer {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: 12px;
  font-size: 11px;
  margin-top: 0.5rem;
}

.card-date {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--ink-3);
  letter-spacing: 0.03em;
}

.card-source {
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  color: var(--ink-3);
  text-decoration: none;
  border-bottom: 1px solid transparent;
  transition: color 0.2s, border-color 0.2s;
}
.card-source:hover {
  color: var(--gold);
  border-bottom-color: var(--gold-light);
}

.tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 0.75rem;
}

.tag {
  display: inline-block;
  font-family: 'Syne', sans-serif;
  font-size: 10px;
  font-weight: 500;
  padding: 4px 9px;
  border-radius: 3px;
  background: rgba(26, 107, 90, 0.1);
  color: #1A6B5A;
  letter-spacing: 0.02em;
}

.empty-section {
  padding: 2rem;
  text-align: center;
  background: var(--white);
  border: 1px solid var(--rule);
  border-radius: 4px;
  color: var(--ink-3);
  font-size: 13px;
}

.archive-link {
  display: inline-block;
  margin-top: 1rem;
  padding: 8px 14px;
  background: var(--navy);
  color: white;
  text-decoration: none;
  border-radius: 3px;
  font-size: 12px;
  font-family: 'Syne', sans-serif;
  font-weight: 500;
  transition: background 0.2s;
}
.archive-link:hover { background: var(--navy-2); }

.loading {
  text-align: center;
  padding: 4rem 2rem;
  font-size: 14px;
  color: var(--ink-3);
}

@media (max-width: 768px) {
  header { padding: 0 1.5rem; }
  nav { padding: 0 1.5rem; }
  main { padding: 1.75rem 1rem 3rem; }
  .section-title { font-size: 22px; }
  .cards-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="brand">
      <div class="brand-name">DIG</div>
      <div class="brand-sep"></div>
      <div class="brand-sub">Regulatory Monitor</div>
    </div>
  </div>
  <div class="header-right">
    <div class="hdr-status" id="status-sync">Loading...</div>
  </div>
</header>

<nav>
  <div class="nav-tab active" data-section="trending">
    <span>Trending</span>
    <span class="nav-count" id="nc-trending"></span>
  </div>
  <div class="nav-tab" data-section="competition">
    <span>Competition</span>
    <span class="nav-count" id="nc-competition"></span>
  </div>
  <div class="nav-tab" data-section="privacy">
    <span>Privacy & Data</span>
    <span class="nav-count" id="nc-privacy"></span>
  </div>
  <div class="nav-tab" data-section="ip">
    <span>IP Law</span>
    <span class="nav-count" id="nc-ip"></span>
  </div>
  <div class="nav-tab" data-section="ai_landscape">
    <div class="ai-dot"></div>
    <span>AI Landscape</span>
    <span class="nav-count" id="nc-ai_landscape"></span>
  </div>
  <div class="nav-tab" data-section="past">
    <span>📦 Past News</span>
    <span class="nav-count" id="nc-past"></span>
  </div>
</nav>

<main>
  <div id="main-content" class="loading">Loading regulatory briefing...</div>
</main>

<script>
// ──────────────────────────────────────────────────────────
// Constants
// ──────────────────────────────────────────────────────────
const WINDOW_DAYS = 7;
const PILLAR_KEYS = ['trending', 'competition', 'privacy', 'ip', 'ai_landscape'];

// ──────────────────────────────────────────────────────────
// Date utilities
// ──────────────────────────────────────────────────────────
function parseDate(article) {
  if (!article.date) return null;
  return new Date(article.date);
}

function isThisWeek(date) {
  const now = new Date();
  const diff = now.getTime() - date.getTime();
  const days = diff / (1000 * 60 * 60 * 24);
  return days >= 0 && days < WINDOW_DAYS;
}

function isToday(date) {
  const now = new Date();
  return date.toDateString() === now.toDateString();
}

function dayLabel(date) {
  if (isToday(date)) return 'Today';
  const yesterday = new Date();
  yesterday.setDate(yesterday.getDate() - 1);
  if (date.toDateString() === yesterday.toDateString()) return 'Yesterday';
  return date.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
}

function formatDateShort(date) {
  return date.toLocaleDateString('en-GB', { day: '2-digit', month: '2-digit', year: 'numeric' });
}

function sortDesc(items) {
  return [...items].sort((a, b) => {
    const da = parseDate(a);
    const db = parseDate(b);
    if (!da || !db) return 0;
    return db.getTime() - da.getTime();
  });
}

function groupByDay(items) {
  const groups = {};
  items.forEach(a => {
    const d = parseDate(a);
    if (!d) return;
    const key = d.toDateString();
    if (!groups[key]) groups[key] = { date: d, items: [] };
    groups[key].items.push(a);
  });
  const sorted = Object.values(groups).sort((a, b) => b.date.getTime() - a.date.getTime());
  return sorted;
}

// ──────────────────────────────────────────────────────────
// Card rendering
// ──────────────────────────────────────────────────────────
function renderCard(article, featured = false, delay = 0) {
  const src = (article.source || 'Source').replace(/\//g, ' / ');
  const date = formatDateShort(parseDate(article) || new Date());
  const tags = (article.tags || []).slice(0, 4).join(', ');
  
  const cardClass = featured ? 'card card-featured' : 'card';
  
  return `
    <div class="${cardClass}" style="animation-delay:${delay}s">
      <div class="card-title">${article.title || 'Untitled'}</div>
      <div class="card-body">${article.body || ''}</div>
      ${tags ? `<div class="tags"><span class="tag">${tags}</span></div>` : ''}
      <div class="card-footer">
        <div>
          <div class="card-date">${date}</div>
          <a href="${article.url || '#'}" target="_blank" rel="noopener" class="card-source">${src}</a>
        </div>
      </div>
    </div>
  `;
}

// ──────────────────────────────────────────────────────────
// Section rendering
// ──────────────────────────────────────────────────────────
const SECTION_META = {
  trending: { label: 'Trending' },
  competition: { label: 'Competition' },
  privacy: { label: 'Privacy & Data' },
  ip: { label: 'IP Law' },
  ai_landscape: { label: 'AI Landscape' }
};

function renderSection(items, sectionKey) {
  const meta = SECTION_META[sectionKey];
  if (!meta) return '<p>Unknown section</p>';
  
  const filtered = items.filter(a => {
    const d = parseDate(a);
    return d && isThisWeek(d);
  });

  if (!filtered.length) {
    return `
      <div class="section-head" style="animation-delay:0.1s">
        <h2 class="section-title">${meta.label}</h2>
        <span class="section-meta">${WINDOW_DAYS}-day window</span>
      </div>
      <div class="empty-section">No ${meta.label.toLowerCase()} articles in the last ${WINDOW_DAYS} days.</div>
    `;
  }

  const sorted = sortDesc(filtered);
  const groups = groupByDay(sorted);

  let html = `
    <div class="section-head" style="animation-delay:0.1s">
      <h2 class="section-title">${meta.label}</h2>
      <span class="section-meta">${filtered.length} article${filtered.length !== 1 ? 's' : ''} · last ${WINDOW_DAYS} days</span>
    </div>
  `;

  let baseDelay = 0.05;
  groups.forEach(g => {
    const today = isToday(g.date);
    html += `
      <div class="day-group">
        <div class="day-group-label${today ? ' today' : ''}">
          <span style="font-weight:600;letter-spacing:0.14em">${dayLabel(g.date)}</span>
          <span style="opacity:0.75;font-weight:400">${g.items.length} item${g.items.length !== 1 ? 's' : ''} · ${formatDateShort(g.date)}</span>
        </div>
        <div class="cards-wrap">
    `;
    const [first, ...rest] = g.items;
    html += renderCard(first, true, baseDelay);
    if (rest.length) {
      html += `<div class="cards-row">` +
        rest.map((a, i) => renderCard(a, false, baseDelay + 0.04 + i * 0.03)).join('') +
        `</div>`;
    }
    html += `</div></div>`;
    baseDelay += 0.1;
  });

  return html;
}

// ──────────────────────────────────────────────────────────
// Past News (localStorage-backed archive)
// ──────────────────────────────────────────────────────────
const PAST_KEY = 'dig_past_news', PREV_KEY = 'dig_prev_index';

function getPast() {
  try { return JSON.parse(localStorage.getItem(PAST_KEY) || '[]'); }
  catch { return []; }
}

function savePast(a) {
  try { localStorage.setItem(PAST_KEY, JSON.stringify(a.slice(0, 500))); }
  catch {}
}

function archiveOld(freshIndex) {
  const freshTitles = new Set();
  PILLAR_KEYS.forEach(k => (freshIndex[k] || []).forEach(a => freshTitles.add(a.title)));
  
  const past = getPast();
  const pastTitles = new Set(past.map(a => a.title));
  
  let prev = [];
  try { prev = JSON.parse(localStorage.getItem(PREV_KEY) || '[]'); }
  catch {}
  
  prev.forEach(a => {
    if (!freshTitles.has(a.title) && !pastTitles.has(a.title)) {
      past.unshift({ ...a, archived_at: new Date().toISOString() });
    }
  });
  
  savePast(past);
  
  const allCurrent = [];
  PILLAR_KEYS.forEach(k => (freshIndex[k] || []).forEach(a => allCurrent.push(a)));
  try { localStorage.setItem(PREV_KEY, JSON.stringify(allCurrent)); }
  catch {}
}

function renderPastNews() {
  const past = getPast();
  const main = document.getElementById('main-content');
  
  if (!past.length) {
    main.innerHTML = `
      <div class="section-head"><h2 class="section-title">Past News Archive</h2></div>
      <div class="empty-section">
        <p><strong>No archived articles yet.</strong><br>Articles older than ${WINDOW_DAYS} days are automatically saved here after each daily update.</p>
        <a href="past-news.html" class="archive-link">View full Past News page →</a>
      </div>
    `;
    return;
  }
  
  const groups = {};
  past.forEach(a => {
    const d = a.archived_at ? new Date(a.archived_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' }) : 'Earlier';
    if (!groups[d]) groups[d] = [];
    groups[d].push(a);
  });
  
  let html = `
    <div class="section-head">
      <h2 class="section-title">Past News Archive</h2>
      <span class="section-meta">${past.length} archived · <a href="past-news.html" style="color:var(--gold);text-decoration:none;">View full →</a></span>
    </div>
  `;
  
  Object.entries(groups).slice(0, 3).forEach(([date, articles]) => {
    html += `<div class="day-group"><div class="day-group-label">Archived ${date}</div><div class="cards-wrap">`;
    const [first, ...rest] = articles;
    html += renderCard(first, true, 0.1);
    if (rest.length) html += `<div class="cards-row">` + rest.map((a, i) => renderCard(a, false, 0.15 + i * 0.05)).join('') + `</div>`;
    html += `</div></div>`;
  });
  
  if (past.length > 10) {
    html += `<div style="text-align:center;margin-top:2rem;"><a href="past-news.html" class="archive-link">View all archived articles →</a></div>`;
  }
  
  main.innerHTML = html;
}

// ──────────────────────────────────────────────────────────
// Navigation
// ──────────────────────────────────────────────────────────
let allData = {}, activeSection = 'trending';

document.querySelectorAll('.nav-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    activeSection = tab.dataset.section;
    renderActive();
  });
});

function renderActive() {
  const main = document.getElementById('main-content');
  if (activeSection === 'past') { renderPastNews(); return; }
  main.innerHTML = renderSection(allData[activeSection] || [], activeSection);
}

function updateCounts() {
  PILLAR_KEYS.forEach(k => {
    const items = (allData[k] || []).filter(a => {
      const d = parseDate(a);
      return d && isThisWeek(d);
    });
    const el = document.getElementById('nc-' + k);
    if (el) el.textContent = items.length || '';
  });
  const el = document.getElementById('nc-past');
  if (el) { const n = getPast().length; el.textContent = n || ''; }
}

// ──────────────────────────────────────────────────────────
// Load content
// ──────────────────────────────────────────────────────────
async function loadContent() {
  try {
    const res = await fetch('content/index.json?t=' + Date.now());
    if (!res.ok) throw new Error('Failed to load content');
    allData = await res.json();
    archiveOld(allData);

    if (allData.generated_at) {
      const d = new Date(allData.generated_at);
      document.getElementById('status-sync').textContent = 'Updated: ' +
        d.toLocaleDateString('en-GB', { day: '2-digit', month: '2-digit', year: 'numeric' }) + ' ' +
        d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }) + ' UTC';
    }
  } catch (err) {
    console.error('Error loading content:', err);
    document.getElementById('status-sync').textContent = 'Failed to load';
  }
  
  updateCounts();
  renderActive();
}

window.addEventListener('load', loadContent);
</script>

</body>
</html>
